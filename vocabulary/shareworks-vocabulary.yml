name: Shareworks Vocabulary
description: Domain vocabulary for equity compensation management on the Shareworks
  platform
provider: shareworks
terms:
- term: Authentication Token
  description: JWT bearer token used to authenticate API requests via RS256 signing
  type: concept
- term: Authorized Capital
  description: Total shares a company is authorized to issue under its charter
  type: concept
- term: Award Type
  description: Category of equity award such as stock options, RSUs, or ESPP
  type: concept
- term: Company
  description: Legal entity managing equity compensation plans on the Shareworks platform
  type: concept
- term: Company Board
  description: Board of directors appointments and governance records for a company
  type: concept
- term: Company Integration
  description: Third-party system integration configuration for a company
  type: concept
- term: Entity Stakeholder
  description: Non-individual legal entity holding equity such as a trust or corporation
  type: concept
- term: Grant
  description: Award of equity compensation issued to a stakeholder
  type: concept
- term: Holdings
  description: Aggregate equity position held by a stakeholder across all grants
  type: concept
- term: Individual Stakeholder
  description: A natural person who holds or may hold equity in a company
  type: concept
- term: Plan
  description: Equity compensation plan defining award rules, pool sizes, and eligibility
  type: concept
- term: Read Access
  description: API permission level allowing retrieval of data without modification
  type: concept
- term: Stock Certificate
  description: Legal instrument representing ownership of shares
  type: concept
- term: Stock Filing
  description: Regulatory filing related to stock issuance or capitalization
  type: concept
- term: Vesting Schedule
  description: Timeline defining when equity awards become exercisable or deliverable
  type: concept
- term: Write Access
  description: API permission level allowing creation or modification of data
  type: concept
- term: AccessToken
  description: Token to accompany all API requests for authentication purposes
  type: schema
- term: AccessTokenRequest
  description: Data model for AccessTokenRequest in the Shareworks API
  type: schema
