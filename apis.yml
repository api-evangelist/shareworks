aid: shareworks
name: Shareworks
description: >-
  Shareworks by Morgan Stanley is an equity compensation management platform
  offering REST APIs for managing stock option plans, RSU grants, ESPP, and
  employee equity administration for both public and private companies. The
  platform provides predictable resource-oriented URLs, JSON-encoded responses,
  and JWT-based bearer token authentication. Access requires IP whitelisting and
  initial setup through Morgan Stanley at Work.
