apis:
  - aid: shareworks:shareworks-public-api
    name: Shareworks Public API
    description: >-
      The Shareworks Public API is a REST-based system for managing equity
      compensation plans including stock options, RSU grants, ESPP, and
      participant data. The API supports both read-only and read-write access
      levels, uses JWT bearer token authentication with RS256 signing, and
      provides separate development and production environments. Access is
      controlled via IP whitelisting.
    humanURL: https://downloads.shareworks.com/api/index.html
